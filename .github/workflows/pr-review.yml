name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD -- '*.js' '*.html' '*.css' | head -c 30000 > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');

          const diff = fs.readFileSync('/tmp/pr_diff.txt', 'utf8');

          const body = JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1500,
            messages: [{
              role: 'user',
              content: `You are reviewing a pull request for a streaming TV app (Nuvio) targeting LG WebOS and Samsung Tizen. Review in this priority order: 1) bugs, 2) WebOS/Tizen-specific problems, 3) performance issues (animations, DOM size, memory leaks), 4) code quality, 5) CSS changes (lowest priority). Be concise and direct. Skip sections with nothing notable.\n\nDiff:\n${diff}`
            }]
          });

          const options = {
            hostname: 'api.anthropic.com',
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'x-api-key': process.env.ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json',
              'content-length': Buffer.byteLength(body)
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const parsed = JSON.parse(data);
              const review = parsed.content?.[0]?.text || 'No review generated';
              fs.writeFileSync('/tmp/review.txt', review);
              console.log('Review generated successfully');
            });
          });

          req.on('error', (e) => {
            console.error('Request failed:', e);
            process.exit(1);
          });

          req.write(body);
          req.end();
          SCRIPT

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Claude Code Review\n\n${review}`
            });